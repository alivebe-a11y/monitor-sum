server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location = / {
        try_files /index.html =404;
    }

    # Glances REST API — same docker network, hostname "glances"
    location /glances/api/ {
        proxy_pass http://glances:61208/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_read_timeout 30s;
    }

    # Scrutiny REST API — same docker network, hostname "scrutiny"
    location /scrutiny/api/ {
        proxy_pass http://scrutiny:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_read_timeout 30s;
    }
}

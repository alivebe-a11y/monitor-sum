<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TrueNAS Health</title>
<style>
  /* Reset */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  /* Theme */
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2128;
    --border: #30363d;
    --text: #e6edf3;
    --text2: #8b949e;
    --text3: #656d76;
    --green: #3fb950;
    --green-bg: #0d2818;
    --yellow: #d29922;
    --yellow-bg: #2a1f00;
    --red: #f85149;
    --red-bg: #2d0f0f;
    --blue: #58a6ff;
    --blue-bg: #0c1e3a;
    --mono: 'SF Mono', 'Fira Code', 'Cascadia Code', Consolas, monospace;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    padding: 2rem;
  }

  h1 {
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 1.5rem;
    letter-spacing: -0.02em;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  h1 .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--green);
    display: inline-block;
  }

  .controls {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 10px;
    margin-bottom: 10px;
    max-width: 700px;
  }

  .field label {
    font-size: 11px;
    color: var(--text3);
    display: block;
    margin-bottom: 5px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  input, select {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    padding: 8px 10px;
    outline: none;
    transition: border-color 0.15s;
  }

  input:focus, select:focus { border-color: var(--blue); }

  .btn-row {
    display: flex;
    gap: 8px;
    margin-bottom: 1.5rem;
    max-width: 700px;
  }

  button {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 13px;
    padding: 8px 16px;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    white-space: nowrap;
  }

  button:hover { background: var(--surface); border-color: #8b949e; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  button.primary { border-color: var(--blue); color: var(--blue); }
  button.primary:hover { background: var(--blue-bg); }

  .status-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 1.25rem;
  }

  .badge {
    font-family: var(--mono);
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 12px;
    font-weight: 500;
  }

  .badge.ok { background: var(--green-bg); color: var(--green); border: 1px solid #1a4a2a; }
  .badge.warn { background: var(--yellow-bg); color: var(--yellow); border: 1px solid #4a3500; }
  .badge.fail { background: var(--red-bg); color: var(--red); border: 1px solid #4a1515; }
  .badge.info { background: var(--blue-bg); color: var(--blue); border: 1px solid #1a3a5c; }
  .badge.muted { background: var(--surface2); color: var(--text2); border: 1px solid var(--border); }

  .metric-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
    gap: 10px;
    margin-bottom: 1.25rem;
    max-width: 700px;
  }

  .metric-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
  }

  .metric-card .lbl {
    font-size: 11px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 4px;
  }

  .metric-card .val {
    font-family: var(--mono);
    font-size: 22px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.2;
  }

  .metric-card .sub {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text3);
    margin-top: 3px;
  }

  .metric-card .val.warn { color: var(--yellow); }
  .metric-card .val.danger { color: var(--red); }

  .section-label {
    font-size: 11px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 8px;
    margin-top: 1rem;
  }

  .alerts-box {
    background: var(--surface);
    border: 1px solid #4a3500;
    border-radius: 8px;
    padding: 10px 14px;
    margin-bottom: 1rem;
    max-width: 700px;
  }

  .alert-item {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--yellow);
    padding: 4px 0;
    border-bottom: 1px solid var(--border);
  }

  .alert-item:last-child { border-bottom: none; }
  .alert-item.critical { color: var(--red); }

  .drives-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 8px;
    margin-bottom: 1.25rem;
    max-width: 700px;
  }

  .drive-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
  }

  .drive-card.fail { border-color: #4a1515; }
  .drive-card.warn { border-color: #4a3500; }

  .drive-card .drive-name {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
    margin-bottom: 2px;
  }

  .drive-card .drive-model {
    font-size: 11px;
    color: var(--text3);
    margin-bottom: 7px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .summary-wrap {
    max-width: 700px;
    margin-top: 1rem;
  }

  .summary-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 18px;
  }

  .summary-box .sum-header {
    font-size: 11px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .summary-box .sum-text {
    font-family: var(--sans);
    font-size: 14px;
    line-height: 1.65;
    color: var(--text);
  }

  .summary-box .sum-text > *:first-child { margin-top: 0; }
  .summary-box .sum-text > *:last-child { margin-bottom: 0; }

  .summary-box .sum-text h1,
  .summary-box .sum-text h2,
  .summary-box .sum-text h3 {
    font-family: var(--sans);
    font-weight: 600;
    color: var(--text);
    margin: 1.2em 0 0.5em;
    letter-spacing: -0.01em;
  }
  .summary-box .sum-text h1 { font-size: 17px; }
  .summary-box .sum-text h2 {
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text2);
    border-bottom: 1px solid var(--border);
    padding-bottom: 4px;
  }
  .summary-box .sum-text h3 { font-size: 13px; color: var(--text2); }

  .summary-box .sum-text p { margin: 0 0 0.8em; }
  .summary-box .sum-text strong { color: var(--text); font-weight: 600; }
  .summary-box .sum-text em { color: var(--text2); font-style: italic; }

  .summary-box .sum-text code {
    font-family: var(--mono);
    font-size: 0.92em;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1px 5px;
    color: var(--blue);
  }
  .summary-box .sum-text pre {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
    overflow-x: auto;
    margin: 0.8em 0;
  }
  .summary-box .sum-text pre code {
    background: transparent;
    border: none;
    padding: 0;
    color: var(--text);
    font-size: 12px;
  }

  .summary-box .sum-text ul,
  .summary-box .sum-text ol { margin: 0.4em 0 0.8em 1.4em; }
  .summary-box .sum-text li { margin: 0.2em 0; }

  .summary-box .sum-text blockquote {
    border-left: 2px solid var(--border);
    padding-left: 12px;
    color: var(--text2);
    margin: 0.6em 0;
  }

  .summary-box .sum-text .sev-critical { color: var(--red); font-weight: 600; }
  .summary-box .sum-text .sev-warning  { color: var(--yellow); font-weight: 600; }
  .summary-box .sum-text .sev-ok       { color: var(--green); font-weight: 600; }

  .spinner {
    display: inline-block;
    width: 12px; height: 12px;
    border: 2px solid var(--border);
    border-top-color: var(--text2);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .err-box {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--red);
    margin-bottom: 6px;
  }

  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 1.25rem 0;
    max-width: 700px;
  }

  .hint {
    font-size: 11px;
    color: var(--text3);
    margin-top: 4px;
    font-family: var(--mono);
  }
</style>
</head>
<body>

<h1><span class="dot"></span> TrueNAS Health</h1>

<div class="controls">
  <div class="field">
    <label>Ollama URL</label>
    <input type="text" id="ollama" placeholder="http://192.168.0.10:11434" />
    <div class="hint">full URL incl. port (must allow CORS via OLLAMA_ORIGINS=*)</div>
  </div>
  <div class="field">
    <label>Ollama model</label>
    <select id="modelSelect"><option value="">— load models first —</option></select>
    <div class="hint" id="model-hint"></div>
  </div>
</div>

<div class="btn-row">
  <button onclick="loadModels()" id="loadBtn">Load models</button>
  <button onclick="fetchAll()" id="fetchBtn" class="primary">Fetch + summarise</button>
</div>

<div id="errors"></div>
<div id="status-row" class="status-row" style="display:none"></div>
<div id="metrics" class="metric-grid" style="display:none"></div>
<div id="alerts-section" style="display:none"></div>
<div id="drives-section" style="display:none"></div>
<hr class="divider" id="div1" style="display:none">
<div id="summary-section" class="summary-wrap" style="display:none">
  <div class="summary-box">
    <div class="sum-header">
      <span id="model-label">AI</span> summary
      <span id="sum-spinner"></span>
    </div>
    <div class="sum-text" id="sum-text"></div>
  </div>
</div>

<script>
// Glances + Scrutiny are reverse-proxied through this same nginx, so we use
// relative URLs and avoid CORS entirely. Ollama stays on a user-supplied URL
// (it's external to this stack) and needs OLLAMA_ORIGINS=* on its host.
const GLANCES_BASE = '/glances/api/4';
const SCRUTINY_BASE = '/scrutiny/api';

const LS_OLLAMA = 'tnh.ollama';

function getOllama() {
  let v = document.getElementById('ollama').value.trim();
  if (!v) return '';
  if (!v.startsWith('http')) v = 'http://' + v;
  return v.replace(/\/+$/, '');
}

function saveSettings() {
  try {
    localStorage.setItem(LS_OLLAMA, document.getElementById('ollama').value.trim());
  } catch(_) {}
}

document.addEventListener('DOMContentLoaded', () => {
  try {
    const o = localStorage.getItem(LS_OLLAMA);
    if (o) document.getElementById('ollama').value = o;
  } catch(_) {}
  document.getElementById('ollama').addEventListener('change', saveSettings);
});

function clearErrors() { document.getElementById('errors').innerHTML = ''; }

function showErr(msg) {
  document.getElementById('errors').innerHTML +=
    `<div class="err-box">⚠ ${msg}</div>`;
}

async function safeFetch(url) {
  try {
    const r = await fetch(url, { signal: AbortSignal.timeout(8000) });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    return await r.json();
  } catch(e) { return null; }
}

function badge(label, cls) {
  return `<span class="badge ${cls}">${label}</span>`;
}

// Tiny markdown renderer for the streamed AI summary. Supports the subset
// Claude tends to use: ##/### headings, **bold**, *italic*, `inline code`,
// ```fenced code blocks```, - / 1. lists, > blockquotes, paragraphs.
// Input is HTML-escaped before any tag substitution to keep XSS off the
// table even though the source is a local LLM.
function escHtml(s) {
  return s.replace(/[&<>"']/g, c =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function renderInline(text) {
  // Input is already HTML-escaped, so any "<" / ">" present here came
  // from substitutions we make below — user-supplied tags can't slip in.
  let h = text;
  h = h.replace(/`([^`\n]+)`/g, '<code>$1</code>');
  h = h.replace(/\*\*([^*\n]+)\*\*/g, '<strong>$1</strong>');
  h = h.replace(/(^|[\s(])\*([^*\n]+)\*/g, '$1<em>$2</em>');
  h = h.replace(/(^|[\s(])_([^_\n]+)_/g, '$1<em>$2</em>');
  h = h.replace(/\b(CRITICAL|FAIL|FAILED)\b/g, '<span class="sev-critical">$1</span>');
  h = h.replace(/\b(WARNING|WARN|CAUTION)\b/g, '<span class="sev-warning">$1</span>');
  h = h.replace(/\b(OK|HEALTHY|PASS|PASSED)\b/g, '<span class="sev-ok">$1</span>');
  return h;
}

function renderMarkdown(src) {
  const escaped = escHtml(src);
  const blocks = escaped.split(/\n{2,}/);
  const out = [];
  for (let block of blocks) {
    if (!block.trim()) continue;
    let m;

    // Fenced code block
    if (m = block.match(/^```(\w*)\n?([\s\S]*?)```\s*$/)) {
      out.push(`<pre><code>${m[2].replace(/\n+$/, '')}</code></pre>`);
      continue;
    }

    // Heading
    if (m = block.match(/^(#{1,6})\s+(.+)$/)) {
      const lvl = Math.min(m[1].length, 3);
      out.push(`<h${lvl}>${renderInline(m[2])}</h${lvl}>`);
      continue;
    }

    // Bullet list
    const lines = block.split('\n');
    if (lines.every(l => /^[-*]\s+/.test(l))) {
      out.push('<ul>' + lines.map(l =>
        `<li>${renderInline(l.replace(/^[-*]\s+/, ''))}</li>`).join('') + '</ul>');
      continue;
    }

    // Numbered list
    if (lines.every(l => /^\d+\.\s+/.test(l))) {
      out.push('<ol>' + lines.map(l =>
        `<li>${renderInline(l.replace(/^\d+\.\s+/, ''))}</li>`).join('') + '</ol>');
      continue;
    }

    // Blockquote
    if (lines.every(l => /^&gt;\s?/.test(l))) {
      const inner = lines.map(l => l.replace(/^&gt;\s?/, '')).join(' ');
      out.push(`<blockquote>${renderInline(inner)}</blockquote>`);
      continue;
    }

    // Paragraph (single \n becomes a soft break)
    out.push(`<p>${renderInline(block).replace(/\n/g, '<br>')}</p>`);
  }
  return out.join('\n');
}

async function loadModels() {
  const ollama = getOllama();
  if (!ollama) { showErr('Enter Ollama URL first (e.g. http://192.168.0.10:11434)'); return; }
  saveSettings();
  const btn = document.getElementById('loadBtn');
  btn.textContent = ''; btn.appendChild(Object.assign(document.createElement('span'), {className:'spinner'}));
  btn.disabled = true;
  const data = await safeFetch(`${ollama}/api/tags`);
  btn.textContent = 'Load models'; btn.disabled = false;
  const sel = document.getElementById('modelSelect');
  const hint = document.getElementById('model-hint');
  if (!data || !data.models || !data.models.length) {
    hint.textContent = 'Could not reach Ollama';
    sel.innerHTML = '<option value="">No models found</option>';
    return;
  }
  sel.innerHTML = data.models.map(m =>
    `<option value="${m.name}">${m.name}</option>`).join('');
  hint.textContent = `${data.models.length} model${data.models.length > 1 ? 's' : ''} available`;
}

function renderStatus(g, s, o) {
  const row = document.getElementById('status-row');
  row.style.display = 'flex';
  row.innerHTML =
    badge('Glances ' + (g ? 'ok' : 'unreachable'), g ? 'ok' : 'fail') +
    badge('Scrutiny ' + (s ? 'ok' : 'unreachable'), s ? 'ok' : 'fail') +
    badge('Ollama ' + (o ? 'ok' : 'unreachable'), o ? 'ok' : 'fail');
}

function renderMetrics(cpu, mem, gpu, load, fs) {
  const el = document.getElementById('metrics');
  el.style.display = 'grid';
  let h = '';
  if (cpu) {
    const iw = cpu.iowait != null ? cpu.iowait.toFixed(1) : '—';
    const tot = cpu.total != null ? cpu.total.toFixed(1) : '—';
    const iwClass = cpu.iowait > 15 ? 'danger' : cpu.iowait > 8 ? 'warn' : '';
    h += `<div class="metric-card">
      <div class="lbl">CPU</div>
      <div class="val">${tot}%</div>
      <div class="sub">iowait <span class="${iwClass}" style="${iwClass?'color:inherit':''}">${iw}%</span></div>
    </div>`;
  }
  if (mem) {
    const p = mem.percent != null ? mem.percent.toFixed(1) : '—';
    const u = mem.used ? (mem.used/1073741824).toFixed(1) : '—';
    const t = mem.total ? (mem.total/1073741824).toFixed(0) : '—';
    h += `<div class="metric-card">
      <div class="lbl">Memory</div>
      <div class="val">${p}%</div>
      <div class="sub">${u} / ${t} GB</div>
    </div>`;
  }
  if (load) {
    h += `<div class="metric-card">
      <div class="lbl">Load (5m)</div>
      <div class="val">${load.min5 != null ? load.min5.toFixed(2) : '—'}</div>
      <div class="sub">${load.cpucore || '?'} cores</div>
    </div>`;
  }
  if (gpu && gpu.length > 0) {
    const g = gpu[0];
    h += `<div class="metric-card">
      <div class="lbl">GPU</div>
      <div class="val">${g.temperature != null ? g.temperature : '—'}°C</div>
      <div class="sub">VRAM ${g.mem != null ? g.mem.toFixed(0) : '—'}%</div>
    </div>`;
  }
  if (fs && fs.length > 0) {
    const root = fs.find(f => f.mnt_point === '/') || fs[0];
    if (root) {
      h += `<div class="metric-card">
        <div class="lbl">Root disk</div>
        <div class="val">${root.percent != null ? root.percent.toFixed(0) : '—'}%</div>
        <div class="sub">${root.mnt_point}</div>
      </div>`;
    }
  }
  el.innerHTML = h;
}

function renderAlerts(alerts) {
  const sec = document.getElementById('alerts-section');
  if (!alerts || !alerts.length) { sec.style.display = 'none'; return; }
  const active = alerts.filter(a => a.end === 0);
  if (!active.length) { sec.style.display = 'none'; return; }
  sec.style.display = 'block';
  sec.innerHTML = `<div class="section-label">Active alerts (${active.length})</div>
    <div class="alerts-box">` +
    active.slice(-6).reverse().map(a => {
      const cls = a.state === 'CRITICAL' ? 'critical' : '';
      const procs = (a.top || []).slice(0, 4).join(', ');
      return `<div class="alert-item ${cls}">${a.state} ${a.type} (${a.min ? a.min.toFixed(1) : '?'}) — ${procs}</div>`;
    }).join('') +
    '</div>';
}

function renderDrives(devices) {
  const sec = document.getElementById('drives-section');
  if (!devices || !devices.length) { sec.style.display = 'none'; return; }
  sec.style.display = 'block';
  let h = `<div class="section-label">Drive health</div><div class="drives-grid">`;
  devices.forEach(d => {
    const passed = d.smart_results ? d.smart_results.passed !== false : null;
    const pending = d.smart_results && d.smart_results.attrs && d.smart_results.attrs['197']
      ? d.smart_results.attrs['197'].raw_value : 0;
    const cls = passed === false ? 'fail' : pending > 0 ? 'warn' : '';
    const b = passed === false
      ? `<span class="badge fail">FAIL</span>`
      : pending > 0
      ? `<span class="badge warn">${pending} pending</span>`
      : `<span class="badge ok">healthy</span>`;
    h += `<div class="drive-card ${cls}">
      <div class="drive-name">${d.device_name || 'unknown'}</div>
      <div class="drive-model">${d.device_model || '—'}</div>
      ${b}
    </div>`;
  });
  h += '</div>';
  sec.innerHTML = h;
}

async function streamOllama(ollama, model, prompt) {
  const sumText = document.getElementById('sum-text');
  const spinner = document.getElementById('sum-spinner');
  const sp = document.createElement('span'); sp.className = 'spinner';
  spinner.appendChild(sp);
  let buf = '';
  let lastRender = 0;
  const flush = (force) => {
    const now = performance.now();
    if (force || now - lastRender > 80) {
      sumText.innerHTML = renderMarkdown(buf);
      lastRender = now;
    }
  };
  sumText.innerHTML = '';
  try {
    const resp = await fetch(`${ollama}/api/generate`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model, prompt, stream: true })
    });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const reader = resp.body.getReader();
    const dec = new TextDecoder();
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      const lines = dec.decode(value).split('\n').filter(l => l.trim());
      for (const line of lines) {
        try {
          const obj = JSON.parse(line);
          if (obj.response) { buf += obj.response; flush(false); }
        } catch(_) {}
      }
    }
    flush(true);
  } catch(e) {
    sumText.textContent = 'Ollama error: ' + e.message;
  }
  spinner.innerHTML = '';
}

async function fetchAll() {
  const ollama = getOllama();
  const model = document.getElementById('modelSelect').value;
  clearErrors();
  if (!ollama) { showErr('Enter your Ollama URL'); return; }
  if (!model) { showErr('Load and select a model first'); return; }
  saveSettings();

  const btn = document.getElementById('fetchBtn');
  const sp = document.createElement('span'); sp.className = 'spinner';
  btn.textContent = ''; btn.appendChild(sp);
  btn.append(' fetching...');
  btn.disabled = true;

  document.getElementById('summary-section').style.display = 'none';
  document.getElementById('div1').style.display = 'none';
  document.getElementById('model-label').textContent = model;

  const [cpu, mem, gpu, load, fs, alert, diskio, scrutiny, ollamaCheck] = await Promise.all([
    safeFetch(`${GLANCES_BASE}/cpu`),
    safeFetch(`${GLANCES_BASE}/mem`),
    safeFetch(`${GLANCES_BASE}/gpu`),
    safeFetch(`${GLANCES_BASE}/load`),
    safeFetch(`${GLANCES_BASE}/fs`),
    safeFetch(`${GLANCES_BASE}/alert`),
    safeFetch(`${GLANCES_BASE}/diskio`),
    safeFetch(`${SCRUTINY_BASE}/summary`),
    safeFetch(`${ollama}/api/tags`),
  ]);

  const glancesOk = !!(cpu || mem);
  const scrutinyOk = !!scrutiny;
  const ollamaOk = !!ollamaCheck;

  renderStatus(glancesOk, scrutinyOk, ollamaOk);
  if (!glancesOk) showErr('Glances unreachable via /glances/api — check that the glances container is up');
  if (!scrutinyOk) showErr('Scrutiny unreachable via /scrutiny/api — check that the scrutiny container is up');
  if (!ollamaOk) showErr(`Ollama unreachable at ${ollama} — check URL and OLLAMA_ORIGINS`);

  if (glancesOk) renderMetrics(cpu, mem, gpu, load, fs);
  if (alert) renderAlerts(alert);

  let devices = [];
  if (scrutinyOk && scrutiny) {
    if (scrutiny.data && scrutiny.data.Summary) {
      devices = Object.keys(scrutiny.data.Summary).map(k =>
        ({ device_name: k, ...scrutiny.data.Summary[k] }));
    } else if (Array.isArray(scrutiny.data)) {
      devices = scrutiny.data;
    } else if (scrutiny.devices) {
      devices = scrutiny.devices;
    }
  }
  renderDrives(devices);

  const payload = {
    cpu: cpu ? { total_pct: cpu.total, iowait_pct: cpu.iowait } : null,
    memory: mem ? {
      used_pct: mem.percent,
      used_gb: mem.used ? (mem.used / 1073741824).toFixed(1) : null,
      total_gb: mem.total ? (mem.total / 1073741824).toFixed(0) : null
    } : null,
    load: load ? { min1: load.min1, min5: load.min5, min15: load.min15, cpu_cores: load.cpucore } : null,
    gpu: gpu && gpu.length > 0 ? gpu.map(g => ({
      name: g.gpu_name || 'GPU', temp_c: g.temperature, vram_pct: g.mem, load_pct: g.gpu
    })) : null,
    filesystems: fs ? fs.map(f => ({
      mount: f.mnt_point,
      used_pct: f.percent,
      free_gb: f.free ? (f.free / 1073741824).toFixed(1) : null
    })) : null,
    active_alerts: alert
      ? alert.filter(a => a.end === 0).map(a => ({
          type: a.type, state: a.state, value: a.min,
          processes: (a.top || []).slice(0, 4)
        }))
      : [],
    disk_io: diskio ? diskio.slice(0, 8).map(d => ({
      disk: d.disk_name,
      read_mb_s: d.read_bytes ? (d.read_bytes / 1048576).toFixed(1) : '0',
      write_mb_s: d.write_bytes ? (d.write_bytes / 1048576).toFixed(1) : '0'
    })) : null,
    smart_health: devices.map(d => ({
      device: d.device_name,
      model: d.device_model || '',
      passed: d.smart_results ? d.smart_results.passed : null,
      pending_sectors: d.smart_results && d.smart_results.attrs && d.smart_results.attrs['197']
        ? d.smart_results.attrs['197'].raw_value : 0
    }))
  };

  const prompt = [
    `You are a senior TrueNAS / homelab operator reviewing live telemetry.`,
    `Write a short health report for the system administrator. Match the tone and formatting of Claude (Anthropic's assistant): direct, technically precise, confidently worded, no filler.`,
    ``,
    `# Output rules`,
    ``,
    `- Use Markdown. The dashboard renders it (headings, bold, italic, inline code, lists, blockquotes).`,
    `- Open with a one-line **overall verdict** in bold. No preamble, no "Here is..." — start with the verdict.`,
    `- Then use \`## Section\` headings for: \`## Compute\` (CPU + load + iowait), \`## Memory\`, \`## GPU\` (only if a GPU is present), \`## Storage\` (filesystems + drive health), \`## Alerts\` (only if there are active alerts), and \`## Action items\` (only if there's something to do — omit if everything is healthy).`,
    `- Inside each section, prefer 1-3 short prose sentences over bullet lists. Use \`**bold**\` to highlight the specific finding (numbers, drive names, severities). Use \`inline code\` for paths, device names (\`/dev/sde\`), process names (\`txg_sync\`), and exact metric values.`,
    `- For severities, use the literal uppercase tokens \`CRITICAL\`, \`WARNING\`, or \`OK\` — the dashboard colours them automatically. Don't invent your own labels.`,
    `- Be confident: state what the data shows ("memory is at 67%"), not what it might show ("memory appears to possibly be"). Never hedge with "it seems", "may be", "could be" unless there's genuine ambiguity in the data.`,
    `- If a value looks normal, say so briefly and move on. Don't pad. A homelab operator should be able to skim the report in under 15 seconds.`,
    `- Keep the whole report under 250 words. No closing paragraph, no "let me know if...".`,
    ``,
    `# Domain knowledge`,
    ``,
    `- Seagate IronWolf drives accumulate \`Raw_Read_Error_Rate\` rapidly by design — that alone is not a failure. The attributes that matter for a SMART verdict are \`Reallocated_Sector_Ct\` (5), \`Current_Pending_Sector\` (197), and \`Offline_Uncorrectable\` (198). \`pending_sectors > 0\` on any drive is **CRITICAL** and warrants immediate replacement.`,
    `- ZFS \`txg_sync\` showing up in \`CPU_IOWAIT\` top processes means the pool's transaction group sync is blocking on slow disks; the standard fix is an NVMe SLOG vdev. \`storagenode\` and \`qbittorrent-nox\` in the same alert mean those workloads are bottlenecking the pool.`,
    `- iowait above 15% sustained is **WARNING**; above 25% sustained is **CRITICAL**. Brief spikes during txg sync are normal.`,
    `- Linux memory percent is misleading because of ARC/cache. Don't flag high used_pct on its own — only flag if both used and there's clear pressure (low free + active swap).`,
    ``,
    `# Telemetry`,
    ``,
    '```json',
    JSON.stringify(payload, null, 2),
    '```'
  ].join('\n');

  document.getElementById('div1').style.display = 'block';
  document.getElementById('summary-section').style.display = 'block';
  await streamOllama(ollama, model, prompt);

  btn.textContent = 'Fetch + summarise';
  btn.disabled = false;
}
</script>
</body>
</html>

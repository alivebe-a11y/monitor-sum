# Glances configuration. Mounted into the container at /glances/glances.conf
# and selected via `-C /glances/glances.conf` in GLANCES_OPT.
#
# Reference: https://glances.readthedocs.io/en/latest/config.html

[outputs]
# CORS for the REST API. Glances defaults to "*" but we set it explicitly so
# the dashboard (served from a different port) can reach the API regardless
# of any defaults baked into the upstream image.
cors_origins=*
cors_methods=GET,POST,OPTIONS
cors_headers=*
cors_credentials=False

# Optional: per-plugin threshold tweaks go below.
#
# [cpu]
# iowait_careful=10
# iowait_warning=20
# iowait_critical=30

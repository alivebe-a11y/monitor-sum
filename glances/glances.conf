# Optional Glances configuration.
# The compose file passes flags via GLANCES_OPT, so this file is only needed
# if you want to override per-plugin thresholds or enable extra modules.
#
# Reference: https://glances.readthedocs.io/en/latest/config.html
#
# Example: bump the iowait CPU warning thresholds so brief ZFS txg_sync
# spikes don't trigger noise.
#
# [cpu]
# iowait_careful=10
# iowait_warning=20
# iowait_critical=30
